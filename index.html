<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrative Fascial Therapy</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:white;
  color:#18323f;
  text-align:center;
}

h1{color:#163b52}
h2{color:#1da6b0}

.section{padding:25px}

textarea{
  width:90%;
  max-width:500px;
  height:100px;
  padding:10px;
}

canvas{
  border:1px solid #ccc;
  margin:10px;
}

.btn{
  background:#1da6b0;
  color:white;
  padding:12px 20px;
  border-radius:25px;
  text-decoration:none;
  display:inline-block;
  margin:10px;
}
</style>
</head>

<body>

<h1>Integrative Fascial Therapy</h1>
<p>Melbourne • Ballarat • Geelong</p>

<div class="section">
<h2>Describe your pain</h2>
<textarea id="text" maxlength="200"></textarea>
</div>

<div class="section">
<h2>Mark your pain (Front & Back)</h2>

<canvas id="front" width="200" height="400"></canvas>
<canvas id="back" width="200" height="400"></canvas>
<br>
<button onclick="clearCanvas()">Clear</button>
</div>

<div class="section">
<button class="btn" onclick="sendWhatsApp()">Send via WhatsApp</button>
</div>

<script>
const canvases=["front","back"];
let current;

canvases.forEach(id=>{
  const c=document.getElementById(id);
  const ctx=c.getContext("2d");

  drawBody(ctx);

  c.addEventListener("mousedown",()=>current=c);
  c.addEventListener("mousemove",e=>draw(e,c));
  c.addEventListener("mouseup",()=>current=null);

  c.addEventListener("touchstart",()=>current=c);
  c.addEventListener("touchmove",e=>drawTouch(e,c));
  c.addEventListener("touchend",()=>current=null);
});

function drawBody(ctx){
  ctx.strokeStyle="#999";
  ctx.lineWidth=2;

  ctx.beginPath();
  ctx.arc(100,40,20,0,Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(100,60);
  ctx.lineTo(100,200);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(100,80);
  ctx.lineTo(50,150);
  ctx.moveTo(100,80);
  ctx.lineTo(150,150);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(100,200);
  ctx.lineTo(60,300);
  ctx.moveTo(100,200);
  ctx.lineTo(140,300);
  ctx.stroke();
}

function draw(e,canvas){
  if(current!==canvas) return;
  const ctx=canvas.getContext("2d");
  ctx.fillStyle="rgba(255,0,0,0.5)";
  ctx.beginPath();
  ctx.arc(e.offsetX,e.offsetY,6,0,Math.PI*2);
  ctx.fill();
}

function drawTouch(e,canvas){
  e.preventDefault();
  if(current!==canvas) return;

  const rect=canvas.getBoundingClientRect();
  const x=e.touches[0].clientX-rect.left;
  const y=e.touches[0].clientY-rect.top;

  const ctx=canvas.getContext("2d");
  ctx.fillStyle="rgba(255,0,0,0.5)";
  ctx.beginPath();
  ctx.arc(x,y,6,0,Math.PI*2);
  ctx.fill();
}

function clearCanvas(){
  canvases.forEach(id=>{
    const c=document.getElementById(id);
    const ctx=c.getContext("2d");
    ctx.clearRect(0,0,c.width,c.height);
    drawBody(ctx);
  });
}

function sendWhatsApp(){
  const text=document.getElementById("text").value;

  const message=`Hi, I would like to book a session.%0A%0AMy pain:%0A${text}%0A%0AI marked the pain on the body map.`;

  window.open(`https://wa.me/61437792933?text=${message}`);
}
</script>

</body>
</html>
