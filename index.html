<script>
const canvases=["front","back"];
let current;

canvases.forEach(id=>{
  const c=document.getElementById(id);
  const ctx=c.getContext("2d");

  drawBody(ctx);

  c.addEventListener("mousedown",()=>current=c);
  c.addEventListener("mousemove",e=>draw(e,c));
  c.addEventListener("mouseup",()=>current=null);

  c.addEventListener("touchstart",()=>current=c);
  c.addEventListener("touchmove",e=>drawTouch(e,c));
  c.addEventListener("touchend",()=>current=null);
});

  ctx.strokeStyle="#aaa";

  ctx.arc(100,40,20,0,Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(100,60);
  ctx.lineTo(100,200);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(100,80);
  ctx.lineTo(50,150);
  ctx.moveTo(100,80);
  ctx.lineTo(150,150);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(100,200);
  ctx.lineTo(60,300);
  ctx.moveTo(100,200);
  ctx.lineTo(140,300);
  ctx.stroke();
}

  ctx.beginPath();
  ctx.arc(e.offsetX,e.offsetY,6,0,Math.PI*2);
  ctx.fill();
}
